kind = "web"
previewPath = "/blog/"
title = "PinnboxIO Blog"
version = "1.0.0"
id = "artifacts/blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/blog" ]
localPort = 18790

[services.development]
run = "pnpm --filter @workspace/blog run dev"

[services.production]

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/blog", "run", "build" ]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = [ "node", "--enable-source-maps", "artifacts/blog/dist/server-bundle/index.mjs" ]

[services.production.run.env]
PORT = "18790"
NODE_ENV = "production"

[services.production.health.startup]
path = "/blog/healthz"

[services.production.health.liveness]
path = "/blog/healthz"

[services.env]
PORT = "18790"
BASE_PATH = "/blog/"
