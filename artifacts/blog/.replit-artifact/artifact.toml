kind = "web"
previewPath = "/blog/"
title = "PinnboxIO Blog"
version = "1.0.0"
id = "artifacts/blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/blog/" ]
localPort = 18790

[services.development]
run = "pnpm --filter @workspace/blog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blog", "run", "build" ]
publicDir = "artifacts/blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18790"
BASE_PATH = "/blog/"
