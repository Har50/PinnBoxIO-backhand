kind = "web"
previewPath = "/"
title = "CommsHub"
version = "1.0.0"
id = "artifacts/unified-comms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18783

[services.development]
run = "pnpm --filter @workspace/unified-comms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unified-comms", "run", "build" ]
publicDir = "artifacts/unified-comms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18783"
BASE_PATH = "/"
