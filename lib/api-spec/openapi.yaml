openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Unified Communications Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: accounts
    description: Email account management
  - name: messages
    description: Messages and emails
  - name: contacts
    description: Contact management
  - name: search
    description: Search operations
  - name: preferences
    description: User notification preferences
  - name: blog
    description: Marketing blog posts sourced from Notion
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /user/preferences:
    get:
      operationId: getUserPreferences
      tags: [preferences]
      summary: Get the current user's notification preferences
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
    patch:
      operationId: updateUserPreferences
      tags: [preferences]
      summary: Update the current user's notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPreferencesBody"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

  /blog/posts:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List published blog posts from Notion
      parameters:
        - name: tag
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostList"

  /blog/posts/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a single blog post by slug, including rendered HTML body
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostDetail"
        "404":
          description: Not found

  /blog/tags:
    get:
      operationId: listBlogTags
      tags: [blog]
      summary: List all tags used in published blog posts with counts
      responses:
        "200":
          description: List of tags with counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogTag"

  /auth/imap/connect:
    post:
      operationId: connectImapAccount
      tags: [accounts]
      summary: Connect a new IMAP email account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImapConnectBody"
      responses:
        "201":
          description: IMAP account connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImapConnectResponse"
        "400":
          description: Connection failed or missing fields

  /auth/imap/{id}/disconnect:
    delete:
      operationId: disconnectImapAccount
      tags: [accounts]
      summary: Disconnect an IMAP email account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found

  /auth/imap/{id}/test:
    post:
      operationId: testImapAccount
      tags: [accounts]
      summary: Test an existing IMAP connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImapTestResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /accounts:
    get:
      operationId: getAccounts
      tags: [accounts]
      summary: List all email accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Add a new email account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get a single account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Remove an email account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: List messages, optionally filtered by account or folder
      parameters:
        - name: accountId
          in: query
          schema:
            type: ["integer", "null"]
        - name: folder
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
    post:
      operationId: createMessage
      tags: [messages]
      summary: Create/send a new message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageBody"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    get:
      operationId: getMessage
      tags: [messages]
      summary: Get a single message with full body
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Not found
    patch:
      operationId: updateMessage
      tags: [messages]
      summary: Update message (mark read/starred, move folder)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageBody"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /messages/{id}/attachments:
    post:
      operationId: addAttachment
      tags: [messages]
      summary: Add an attachment reference to a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentBody"
      responses:
        "201":
          description: Attachment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /contacts:
    get:
      operationId: getContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - name: q
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}/messages:
    get:
      operationId: getContactMessages
      tags: [contacts]
      summary: List messages from a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Messages from this contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
        "404":
          description: Not found

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /search:
    get:
      operationId: searchAll
      tags: [search]
      summary: Search across all messages and contacts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: ["string", "null"]
            enum: ["messages", "contacts", "all", null]
        - name: accountId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /stats/overview:
    get:
      operationId: getOverviewStats
      tags: [messages]
      summary: Overview stats - unread counts, total per account
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewStats"

  /messages/folder-counts:
    get:
      operationId: getFolderCounts
      tags: [messages]
      summary: Get message counts (total and unread) per folder
      parameters:
        - name: accountId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Folder counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FolderCount"

  /messages/recent:
    get:
      operationId: getRecentMessages
      tags: [messages]
      summary: Get recent messages across all accounts
      parameters:
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Recent messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Account:
      type: object
      properties:
        id:
          type: integer
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        name:
          type: string
        provider:
          type: string
          enum: [gmail, outlook, yahoo, imap, other, whatsapp, phone]
        color:
          type: string
        isActive:
          type: boolean
        unreadCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - provider
        - color
        - isActive
        - unreadCount
        - createdAt

    CreateAccountBody:
      type: object
      properties:
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        name:
          type: string
        provider:
          type: string
          enum: [gmail, outlook, yahoo, imap, other, whatsapp, phone]
        color:
          type: string
      required:
        - name
        - provider

    Message:
      type: object
      properties:
        id:
          type: integer
        accountId:
          type: integer
        accountEmail:
          type: string
        accountName:
          type: string
        accountColor:
          type: string
        folder:
          type: string
        subject:
          type: string
        fromName:
          type: string
        fromEmail:
          type: string
        toList:
          type: string
        ccList:
          type: ["string", "null"]
        bodyText:
          type: ["string", "null"]
        bodyHtml:
          type: ["string", "null"]
        isRead:
          type: boolean
        isStarred:
          type: boolean
        hasAttachments:
          type: boolean
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
        receivedAt:
          type: string
        createdAt:
          type: string
      required:
        - id
        - accountId
        - accountEmail
        - accountName
        - accountColor
        - folder
        - subject
        - fromName
        - fromEmail
        - toList
        - isRead
        - isStarred
        - hasAttachments
        - attachments
        - receivedAt
        - createdAt

    MessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        total:
          type: integer
        hasMore:
          type: boolean
      required:
        - messages
        - total
        - hasMore

    CreateMessageBody:
      type: object
      properties:
        accountId:
          type: integer
        folder:
          type: string
        subject:
          type: string
        fromName:
          type: string
        fromEmail:
          type: string
        toList:
          type: string
        ccList:
          type: ["string", "null"]
        bodyText:
          type: ["string", "null"]
        bodyHtml:
          type: ["string", "null"]
        isRead:
          type: boolean
        isStarred:
          type: boolean
        receivedAt:
          type: string
      required:
        - accountId
        - folder
        - subject
        - fromName
        - fromEmail
        - toList
        - receivedAt

    UpdateMessageBody:
      type: object
      properties:
        isRead:
          type: ["boolean", "null"]
        isStarred:
          type: ["boolean", "null"]
        folder:
          type: ["string", "null"]

    Attachment:
      type: object
      properties:
        id:
          type: integer
        messageId:
          type: integer
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        url:
          type: ["string", "null"]
      required:
        - id
        - messageId
        - filename
        - mimeType
        - size

    CreateAttachmentBody:
      type: object
      properties:
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        url:
          type: ["string", "null"]
      required:
        - filename
        - mimeType
        - size

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        messageCount:
          type: integer
        unreadCount:
          type: integer
        lastMessageAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - messageCount
        - unreadCount
        - createdAt

    CreateContactBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - name
        - email

    UpdateContactBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    SearchResults:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        query:
          type: string
        totalMessages:
          type: integer
        totalContacts:
          type: integer
      required:
        - messages
        - contacts
        - query
        - totalMessages
        - totalContacts

    OverviewStats:
      type: object
      properties:
        totalAccounts:
          type: integer
        totalMessages:
          type: integer
        totalUnread:
          type: integer
        totalStarred:
          type: integer
        totalContacts:
          type: integer
        accountBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/AccountStat"
      required:
        - totalAccounts
        - totalMessages
        - totalUnread
        - totalStarred
        - totalContacts
        - accountBreakdown

    FolderCount:
      type: object
      properties:
        folder:
          type: string
        total:
          type: integer
        unread:
          type: integer
      required:
        - folder
        - total
        - unread

    AccountStat:
      type: object
      properties:
        accountId:
          type: integer
        email:
          type: string
        name:
          type: string
        color:
          type: string
        unread:
          type: integer
        total:
          type: integer
      required:
        - accountId
        - email
        - name
        - color
        - unread
        - total

    NotificationPreferences:
      type: object
      properties:
        emailSummary:
          type: boolean
        importantMessages:
          type: boolean
        weeklyDigest:
          type: boolean
      required:
        - emailSummary
        - importantMessages
        - weeklyDigest

    UpdateNotificationPreferencesBody:
      type: object
      properties:
        emailSummary:
          type: boolean
        importantMessages:
          type: boolean
        weeklyDigest:
          type: boolean

    ImapConnectBody:
      type: object
      required: [email, host, username, password]
      properties:
        email:
          type: string
        displayName:
          type: ["string", "null"]
        host:
          type: string
        port:
          type: ["integer", "null"]
        secure:
          type: ["boolean", "null"]
        username:
          type: string
        password:
          type: string
        color:
          type: ["string", "null"]

    ImapConnectResponse:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: ["string", "null"]

    ImapTestResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        error:
          type: ["string", "null"]

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    BlogPost:
      type: object
      required: [id, slug, title]
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: ["string", "null"]
        coverImage:
          type: ["string", "null"]
        author:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        readingMinutes:
          type: ["integer", "null"]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        aiSummary:
          type: ["string", "null"]

    BlogPostDetail:
      allOf:
        - $ref: "#/components/schemas/BlogPost"
        - type: object
          required: [bodyHtml]
          properties:
            bodyHtml:
              type: string

    BlogPostList:
      type: object
      required: [posts]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/BlogPost"

    BlogTag:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer
