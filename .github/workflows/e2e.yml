name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

run-name: >-
  ${{ github.event_name == 'schedule' && 'Nightly E2E – scheduled' ||
      github.event_name == 'workflow_dispatch' && 'E2E Tests – manual' ||
      format('E2E Tests – {0} #{1}', github.event_name, github.run_number) }}

jobs:
  e2e:
    name: Protected-routes E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    env:
      CI: "true"
      PORT: "5173"
      BASE_PATH: "/"
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify required secrets are configured
        run: |
          if [ -z "$CLERK_SECRET_KEY" ]; then
            echo "::error::CLERK_SECRET_KEY secret is not set. Both authenticated and unauthenticated route-protection tests require this secret. Configure it in the repository Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::CLERK_PUBLISHABLE_KEY secret is not set. The Clerk testing library and the Vite dev server both require this key."
            exit 1
          fi
          echo "Clerk secrets are present — authenticated tests will run."

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @workspace/unified-comms exec playwright install chromium --with-deps

      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @workspace/unified-comms exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @workspace/unified-comms run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/unified-comms/playwright-report/
          retention-days: 30

      - name: Close stale nightly issues on success
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly,regression',
              per_page: 100,
            });
            const webIssues = openIssues.filter(issue =>
              issue.labels.every(l => l.name !== 'mobile')
            );
            for (const issue of webIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `The nightly E2E tests have **passed** again — this regression appears to be resolved.`,
                  ``,
                  `**Passing run:** [${context.runId}](${runUrl})`,
                  `**Commit:** \`${context.sha.slice(0, 7)}\``,
                  ``,
                  `Closing this issue automatically.`,
                ].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Open GitHub issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 Nightly E2E failure – ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `The **nightly E2E test run** failed on \`${context.sha.slice(0, 7)}\`.`,
              ``,
              `**Run:** [${context.runId}](${runUrl})`,
              `**Branch:** \`${context.ref}\``,
              `**Triggered by:** scheduled cron (daily at 00:00 UTC)`,
              ``,
              `Please investigate and fix any regressions before the next scheduled run.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['e2e', 'regression', 'nightly'],
            });

      - name: Notify Slack on nightly failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL is not set — skipping Slack notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%d)"
          curl -s --fail -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rotating_light: *Nightly E2E failure – ${DATE}*\nCommit: \`${SHORT_SHA}\`\nRun: <${RUN_URL}|View run>\nPlease investigate before the next scheduled run.\"
            }"

  mobile-e2e:
    name: Mobile E2E (carousel)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write

    env:
      CI: "true"
      PORT: "8081"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache-mobile
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium browser
        if: steps.playwright-cache-mobile.outputs.cache-hit != 'true'
        run: pnpm --filter @workspace/mobile exec playwright install chromium --with-deps

      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache-mobile.outputs.cache-hit == 'true'
        run: pnpm --filter @workspace/mobile exec playwright install-deps chromium

      - name: Run mobile E2E tests
        id: run-mobile-e2e
        run: pnpm --filter @workspace/mobile run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: artifacts/mobile/playwright-report/
          retention-days: 30

      - name: Restore PR comment ID from cache
        if: always() && github.event_name == 'pull_request'
        id: restore-comment-id
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: .mobile-e2e-comment-id
          key: mobile-e2e-pr-comment-${{ github.event.pull_request.number }}-${{ github.run_id }}
          restore-keys: |
            mobile-e2e-pr-comment-${{ github.event.pull_request.number }}-

      - name: Post PR summary comment
        if: always() && github.event_name == 'pull_request'
        id: post-pr-comment
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          TEST_OUTCOME: ${{ steps.run-mobile-e2e.outcome }}
        with:
          script: |
            const fs = require('fs');
            const outcome = process.env.TEST_OUTCOME;
            const passed = outcome === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts`;
            const statusIcon = passed ? '✅' : '❌';
            const statusLabel = passed ? 'passed' : 'failed';
            const marker = '<!-- mobile-e2e-summary -->';
            const body = [
              marker,
              `## ${statusIcon} Mobile E2E tests ${statusLabel}`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Status** | ${statusIcon} ${statusLabel} |`,
              `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
              `| **Run** | [#${context.runId}](${runUrl}) |`,
              `| **Report** | [Download Playwright report](${artifactUrl}) |`,
              ``,
              `_Updated on every push. Full trace and screenshots available in the [uploaded artifact](${artifactUrl})._`,
            ].join('\n');

            // Try to reuse the comment ID persisted from a previous run on this PR.
            let commentId = null;
            try {
              const cached = fs.readFileSync('.mobile-e2e-comment-id', 'utf8').trim();
              if (cached) commentId = parseInt(cached, 10);
            } catch {}

            if (commentId) {
              try {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: commentId,
                  body,
                });
                core.info(`Updated PR comment by stored ID: ${commentId}`);
              } catch (err) {
                // Comment may have been deleted; reset and fall through.
                core.warning(`Could not update stored comment id ${commentId}: ${err.message}`);
                commentId = null;
              }
            }

            if (!commentId) {
              // Fallback: paginate all PR comments to find a bot-authored one with the marker.
              const allComments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                }
              );
              const existing = allComments.find(c =>
                c.body && c.body.includes(marker) && c.user && c.user.type === 'Bot'
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                commentId = existing.id;
                core.info(`Updated PR comment via marker scan (id: ${commentId})`);
              } else {
                const created = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
                commentId = created.data.id;
                core.info(`Created new PR comment (id: ${commentId})`);
              }
            }

            // Persist the comment ID for future runs on this PR.
            fs.writeFileSync('.mobile-e2e-comment-id', String(commentId));

      - name: Save PR comment ID to cache
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: .mobile-e2e-comment-id
          key: mobile-e2e-pr-comment-${{ github.event.pull_request.number }}-${{ github.run_id }}

      - name: Close stale nightly mobile issues on success
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nightly,regression,mobile',
              per_page: 100,
            });
            for (const issue of openIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `The nightly mobile E2E tests have **passed** again — this regression appears to be resolved.`,
                  ``,
                  `**Passing run:** [${context.runId}](${runUrl})`,
                  `**Commit:** \`${context.sha.slice(0, 7)}\``,
                  ``,
                  `Closing this issue automatically.`,
                ].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Open GitHub issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 Nightly mobile E2E failure – ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `The **nightly mobile E2E test run** failed on \`${context.sha.slice(0, 7)}\`.`,
              ``,
              `**Run:** [${context.runId}](${runUrl})`,
              `**Branch:** \`${context.ref}\``,
              `**Triggered by:** scheduled cron (daily at 00:00 UTC)`,
              ``,
              `Please investigate and fix any carousel regressions before the next scheduled run.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['e2e', 'regression', 'nightly', 'mobile'],
            });

      - name: Notify Slack on nightly failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL is not set — skipping Slack notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          DATE="$(date -u +%Y-%m-%d)"
          curl -s --fail -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rotating_light: *Nightly mobile E2E failure – ${DATE}*\nCommit: \`${SHORT_SHA}\`\nRun: <${RUN_URL}|View run>\nPlease investigate before the next scheduled run.\"
            }"
